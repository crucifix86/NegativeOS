set default=0
set timeout=5

# NegativeOS GRUB config — BIOS + UEFI hybrid

menuentry "NegativeOS (Live)" {
    linux   /live/vmlinuz console=ttyS0,115200 console=tty0 rw noefifb
    initrd  /live/initrd.img
}

menuentry "NegativeOS (Live - Safe Mode)" {
    linux   /live/vmlinuz console=ttyS0,115200 console=tty0 rw nomodeset
    initrd  /live/initrd.img
}

menuentry "NegativeOS Installer" {
    linux   /live/vmlinuz console=ttyS0,115200 console=tty0 rw negativeos.install=1
    initrd  /live/initrd.img
}

menuentry "Boot from first hard disk" {
    chainloader +1
}
